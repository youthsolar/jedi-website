<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-dark: #1C1917;
  --c-dark-soft: #292524;
  --c-accent: #A16207;
  --c-accent-light: #CA8A04;
  --c-accent-warm: #D97706;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: 'Noto Sans TC', 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--c-dark);
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 40%, rgba(161,98,7,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 30% 70%, rgba(202,138,4,0.04) 0%, transparent 60%);
  pointer-events: none;
}

body::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
}

.wrapper {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem 1.25rem;
  max-width: 560px;
}

.logo {
  font-family: 'Inter', sans-serif;
  font-size: clamp(3rem, 10vw, 5rem);
  font-weight: 700;
  color: var(--c-accent-light);
  letter-spacing: 0.06em;
  line-height: 1;
  margin-bottom: 1rem;
}

.logo span {
  color: #fff;
  font-weight: 300;
}

.subtitle {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(1.125rem, 3vw, 1.5rem);
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.08em;
  margin-bottom: 2.5rem;
}

.coming {
  font-size: 1rem;
  color: rgba(255,255,255,0.4);
  line-height: 2;
  letter-spacing: 0.04em;
  margin-bottom: 3rem;
}

.coming strong {
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}

.divider {
  width: 40px;
  height: 2px;
  background: var(--c-accent);
  margin: 0 auto 2.5rem;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 2rem;
  background: var(--c-accent);
  color: #fff;
  font-weight: 500;
  font-size: 0.875rem;
  border-radius: 9999px;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  letter-spacing: 0.04em;
}

.btn-back:hover {
  background: var(--c-accent-warm);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(161,98,7,0.4);
}

.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--c-accent-light);
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
  margin-right: 0.5rem;
  vertical-align: middle;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="logo">2PR<span>.ai</span></div>
  <div class="subtitle">AI 智能新聞稿發送平台</div>
  <div class="divider"></div>
  <div class="coming">
    <span class="pulse-dot"></span><strong>即將上線，敬請期待</strong><br>
    Coming Soon
  </div>
